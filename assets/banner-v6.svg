<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#241c30" />
      <stop offset="55%" stop-color="#140f1d" />
      <stop offset="100%" stop-color="#08060c" />
    </radialGradient>
    <radialGradient id="sigilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c46a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#e8c46a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a046" stop-opacity="0" />
      <stop offset="50%" stop-color="#e8c46a" stop-opacity="1" />
      <stop offset="100%" stop-color="#c9a046" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f6e8c4" />
      <stop offset="100%" stop-color="#d8b66a" />
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="grain" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="8" r="0.7" fill="#e8c46a" opacity="0.05" />
      <circle cx="28" cy="22" r="0.6" fill="#e8c46a" opacity="0.04" />
      <circle cx="40" cy="38" r="0.7" fill="#e8c46a" opacity="0.05" />
      <circle cx="14" cy="42" r="0.5" fill="#e8c46a" opacity="0.04" />
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGlow)" />
  <rect width="1200" height="320" fill="url(#grain)" />
  <ellipse cx="600" cy="110" rx="240" ry="140" fill="url(#sigilGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite" />
  </ellipse>

  <!-- frame corners -->
  <g stroke="#c9a046" stroke-width="1.2" opacity="0" fill="none">
    <animate attributeName="opacity" from="0" to="0.55" dur="0.6s" begin="0.1s" fill="freeze" />
    <path d="M36,26 h32 M36,26 v32" />
    <path d="M1164,26 h-32 M1164,26 v32" />
    <path d="M36,294 h32 M36,294 v-32" />
    <path d="M1164,294 h-32 M1164,294 v-32" />
  </g>

  <!-- top rule -->
  <line x1="600" y1="50" x2="600" y2="50" stroke="url(#goldFade)" stroke-width="1.3">
    <animate attributeName="x1" from="600" to="160" dur="0.9s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
    <animate attributeName="x2" from="600" to="1040" dur="0.9s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
  </line>
  <g transform="translate(600,50)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.0s" fill="freeze" />
    <circle r="7" fill="none" stroke="#e8c46a" stroke-width="1.3" />
    <circle r="2" fill="#e8c46a" />
  </g>

  <!-- flourishes -->
  <g transform="translate(210,160)" stroke="#c9a046" stroke-width="1.3" fill="none" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" dur="0.6s" begin="0.7s" fill="freeze" />
    <path d="M0,0 C 16,-22 16,-46 0,-66" />
    <path d="M0,0 C 16,22 16,46 0,66" />
    <circle cx="2" cy="0" r="3" fill="#e8c46a" stroke="none" />
  </g>
  <g transform="translate(990,160) scale(-1,1)" stroke="#c9a046" stroke-width="1.3" fill="none" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" dur="0.6s" begin="0.7s" fill="freeze" />
    <path d="M0,0 C 16,-22 16,-46 0,-66" />
    <path d="M0,0 C 16,22 16,46 0,66" />
    <circle cx="2" cy="0" r="3" fill="#e8c46a" stroke="none" />
  </g>

  <!-- sigil, rotates in then continues rotating forever (outer ring only) -->
  <g transform="translate(600,112) rotate(-30)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.4s" fill="freeze" />
    <animateTransform attributeName="transform" type="rotate" from="-30" to="0" additive="sum" dur="0.8s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" />
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="40s" begin="1.2s" repeatCount="indefinite" />
      <circle r="34" fill="none" stroke="#e8c46a" stroke-width="1.1" opacity="0.55" />
    </g>
    <circle r="26" fill="none" stroke="#e8c46a" stroke-width="0.8" opacity="0.4" />
    <path d="M0,-34 L4,-26 L0,-19 L-4,-26 Z" fill="#e8c46a" />
    <path d="M0,34 L4,26 L0,19 L-4,26 Z" fill="#e8c46a" />
    <path d="M-34,0 L-26,4 L-19,0 L-26,-4 Z" fill="#e8c46a" />
    <path d="M34,0 L26,4 L19,0 L26,-4 Z" fill="#e8c46a" />
    <path d="M0,-19 L9,0 L0,19 L-9,0 Z" fill="#e8c46a" />
    <circle r="3.2" fill="#0c0710" />
  </g>

  <!-- title, fades up then glows perpetually -->
  <text x="600" y="225" text-anchor="middle" font-family="'Cinzel Decorative','Cinzel',Georgia,serif" font-weight="700" font-size="60" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="4" opacity="0">
    TEYTANN
    <animate attributeName="y" from="240" to="225" dur="0.7s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" />
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.2s" fill="freeze" />
  </text>
  <text x="600" y="225" text-anchor="middle" font-family="'Cinzel Decorative','Cinzel',Georgia,serif" font-weight="700" font-size="60" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="4" opacity="0">
    TEYTANN
    <animate attributeName="opacity" values="0;0;0.35;0" dur="4.5s" begin="1.9s" repeatCount="indefinite" />
  </text>

  <!-- subtitle -->
  <text x="600" y="258" text-anchor="middle" font-family="'Cormorant SC',Georgia,serif" font-style="italic" font-size="20" letter-spacing="3" fill="#b8a886" opacity="0">
    Builder &#183; CS Graduate &#183; Forever Learning
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.9s" fill="freeze" />
  </text>

  <!-- bottom rule -->
  <line x1="600" y1="280" x2="600" y2="280" stroke="url(#goldFade)" stroke-width="1.3">
    <animate attributeName="x1" from="600" to="250" dur="0.9s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
    <animate attributeName="x2" from="600" to="950" dur="0.9s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
  </line>

  <!-- ambient twinkles, continuous loop -->
  <circle cx="320" cy="80" r="1.6" fill="#e8c46a"><animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="0s" repeatCount="indefinite" /></circle>
  <circle cx="880" cy="95" r="1.3" fill="#e8c46a"><animate attributeName="opacity" values="0;0.8;0" dur="4s" begin="1s" repeatCount="indefinite" /></circle>
  <circle cx="250" cy="230" r="1.4" fill="#e8c46a"><animate attributeName="opacity" values="0;0.85;0" dur="3.6s" begin="2s" repeatCount="indefinite" /></circle>
  <circle cx="950" cy="220" r="1.5" fill="#e8c46a"><animate attributeName="opacity" values="0;0.9;0" dur="3.8s" begin="0.6s" repeatCount="indefinite" /></circle>
  <circle cx="500" cy="60" r="1.2" fill="#e8c46a"><animate attributeName="opacity" values="0;0.7;0" dur="2.8s" begin="1.6s" repeatCount="indefinite" /></circle>
  <circle cx="720" cy="65" r="1.3" fill="#e8c46a"><animate attributeName="opacity" values="0;0.8;0" dur="3.4s" begin="2.4s" repeatCount="indefinite" /></circle>
</svg>

<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#241c30" />
      <stop offset="55%" stop-color="#140f1d" />
      <stop offset="100%" stop-color="#08060c" />
    </radialGradient>
    <radialGradient id="sigilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c46a" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#e8c46a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a046" stop-opacity="0" />
      <stop offset="50%" stop-color="#e8c46a" stop-opacity="1" />
      <stop offset="100%" stop-color="#c9a046" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f6e8c4" />
      <stop offset="100%" stop-color="#d8b66a" />
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="grain" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="8" r="0.7" fill="#e8c46a" opacity="0.05" />
      <circle cx="28" cy="22" r="0.6" fill="#e8c46a" opacity="0.04" />
      <circle cx="40" cy="38" r="0.7" fill="#e8c46a" opacity="0.05" />
      <circle cx="14" cy="42" r="0.5" fill="#e8c46a" opacity="0.04" />
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bgGlow)" />
  <rect width="1200" height="360" fill="url(#grain)" />
  <ellipse cx="600" cy="120" rx="260" ry="160" fill="url(#sigilGlow)" />

  <!-- frame corners -->
  <g stroke="#c9a046" stroke-width="1.2" opacity="0.55" fill="none">
    <path d="M40,30 h36 M40,30 v36" />
    <path d="M1160,30 h-36 M1160,30 v36" />
    <path d="M40,330 h36 M40,330 v-36" />
    <path d="M1160,330 h-36 M1160,330 v-36" />
  </g>

  <!-- top rule with center ornament -->
  <line x1="150" y1="58" x2="1050" y2="58" stroke="url(#goldFade)" stroke-width="1.3" />
  <g transform="translate(600,58)">
    <circle r="7" fill="none" stroke="#e8c46a" stroke-width="1.3" />
    <circle r="2" fill="#e8c46a" />
    <path d="M-22,0 h10 M22,0 h-10" stroke="#e8c46a" stroke-width="1.1" />
  </g>

  <!-- left flourish -->
  <g transform="translate(195,200)" stroke="#c9a046" stroke-width="1.3" fill="none" opacity="0.8">
    <path d="M0,0 C 18,-26 18,-54 0,-78" />
    <path d="M0,0 C 18,26 18,54 0,78" />
    <circle cx="2" cy="0" r="3.2" fill="#e8c46a" stroke="none" />
  </g>
  <!-- right flourish (mirrored) -->
  <g transform="translate(1005,200) scale(-1,1)" stroke="#c9a046" stroke-width="1.3" fill="none" opacity="0.8">
    <path d="M0,0 C 18,-26 18,-54 0,-78" />
    <path d="M0,0 C 18,26 18,54 0,78" />
    <circle cx="2" cy="0" r="3.2" fill="#e8c46a" stroke="none" />
  </g>

  <!-- sigil -->
  <g transform="translate(600,130)">
    <circle r="38" fill="none" stroke="#e8c46a" stroke-width="1.1" opacity="0.55" />
    <circle r="29" fill="none" stroke="#e8c46a" stroke-width="0.8" opacity="0.4" />
    <g opacity="0.9">
      <path d="M0,-38 L4,-30 L0,-22 L-4,-30 Z" fill="#e8c46a" />
      <path d="M0,38 L4,30 L0,22 L-4,30 Z" fill="#e8c46a" />
      <path d="M-38,0 L-30,4 L-22,0 L-30,-4 Z" fill="#e8c46a" />
      <path d="M38,0 L30,4 L22,0 L30,-4 Z" fill="#e8c46a" />
    </g>
    <path d="M0,-22 L10,0 L0,22 L-10,0 Z" fill="#e8c46a" />
    <circle r="3.5" fill="#0c0710" />
  </g>

  <!-- title -->
  <text x="600" y="248" text-anchor="middle" font-family="'Cinzel Decorative','Cinzel',Georgia,serif" font-weight="700" font-size="64" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="4">TEYTANN</text>

  <!-- subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="'Cormorant SC',Georgia,serif" font-style="italic" font-size="21" letter-spacing="3" fill="#b8a886">Builder &#183; CS Graduate &#183; Forever Learning</text>

  <!-- bottom rule with center ornament -->
  <g transform="translate(600,318)">
    <path d="M-22,0 h10 M22,0 h-10" stroke="#e8c46a" stroke-width="1.1" />
    <path d="M-4,-4 L0,2 L4,-4" fill="none" stroke="#e8c46a" stroke-width="1.1" />
  </g>
  <line x1="230" y1="318" x2="970" y2="318" stroke="url(#goldFade)" stroke-width="1.3" />
</svg>

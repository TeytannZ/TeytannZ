<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1c1626" />
      <stop offset="100%" stop-color="#0a0710" />
    </radialGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#caa24a" stop-opacity="0" />
      <stop offset="15%" stop-color="#caa24a" stop-opacity="1" />
      <stop offset="85%" stop-color="#caa24a" stop-opacity="1" />
      <stop offset="100%" stop-color="#caa24a" stop-opacity="0" />
    </linearGradient>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grain" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="6" r="0.8" fill="#caa24a" opacity="0.05" />
      <circle cx="22" cy="18" r="0.6" fill="#caa24a" opacity="0.04" />
      <circle cx="33" cy="30" r="0.7" fill="#caa24a" opacity="0.05" />
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGlow)" />
  <rect width="1200" height="320" fill="url(#grain)" />

  <!-- top ornamental rule, draws itself -->
  <line x1="600" y1="46" x2="600" y2="46" stroke="url(#goldFade)" stroke-width="1.5">
    <animate attributeName="x1" from="600" to="120" dur="1s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
    <animate attributeName="x2" from="600" to="1080" dur="1s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
  </line>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.0s" fill="freeze" />
    <circle cx="600" cy="46" r="5" fill="none" stroke="#caa24a" stroke-width="1.5" />
    <circle cx="600" cy="46" r="1.6" fill="#caa24a" />
  </g>

  <!-- sigil: simple rune circle, rotates in -->
  <g transform="translate(600,118)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="rotate" from="-35 600 118" to="0 600 118" additive="sum" dur="0.8s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" />
    <circle r="30" fill="none" stroke="#caa24a" stroke-width="1.2" opacity="0.7" />
    <circle r="22" fill="none" stroke="#caa24a" stroke-width="0.8" opacity="0.45" />
    <path d="M0,-30 L8,-12 L0,6 L-8,-12 Z" fill="#caa24a" opacity="0.85" />
  </g>

  <!-- title -->
  <text x="600" y="205" text-anchor="middle" font-family="'Cinzel Decorative', 'Cinzel', serif" font-weight="700" font-size="58" fill="#e9d9ad" filter="url(#goldGlow)" opacity="0">
    TEYTANN
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.3s" fill="freeze" />
  </text>
  <!-- subtitle -->
  <text x="600" y="250" text-anchor="middle" font-family="'Cormorant SC', serif" font-style="italic" font-size="22" letter-spacing="2" fill="#a99a86" opacity="0">
    Builder · CS Graduate · Forever Learning
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="2.0s" fill="freeze" />
  </text>

  <!-- bottom ornamental rule, draws itself -->
  <line x1="600" y1="280" x2="600" y2="280" stroke="url(#goldFade)" stroke-width="1.5">
    <animate attributeName="x1" from="600" to="220" dur="1s" begin="2.4s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
    <animate attributeName="x2" from="600" to="980" dur="1s" begin="2.4s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1" />
  </line>
</svg>
